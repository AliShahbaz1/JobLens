<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobLens — Is This Job Real?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 24px 40px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo { font-size: 24px; font-weight: 700; color: #fff; }
    .logo span { color: #6c63ff; }
    .tagline { font-size: 13px; color: #666; margin-left: auto; }

    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }

    .hero h1 span { color: #6c63ff; }

    .hero p {
      font-size: 18px;
      color: #888;
      max-width: 500px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .search-box {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }

    .search-box input {
      flex: 1;
      padding: 16px 20px;
      background: #13131f;
      border: 1px solid #2a2a3e;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: #6c63ff; }
    .search-box input::placeholder { color: #444; }

    .search-box button {
      padding: 16px 28px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover { background: #5a52e0; }
    .search-box button:disabled { background: #333; cursor: not-allowed; }

    .status {
      text-align: center;
      margin: 24px auto;
      max-width: 680px;
      font-size: 14px;
      color: #6c63ff;
      min-height: 20px;
    }

    .result-card {
      max-width: 680px;
      margin: 0 auto 40px;
      background: #13131f;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      overflow: hidden;
      display: none;
    }

    .verdict-banner {
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .verdict-banner.APPLY { background: #0d2e1a; border-bottom: 1px solid #1a5c33; }
    .verdict-banner.CAUTION { background: #2e2000; border-bottom: 1px solid #5c4000; }
    .verdict-banner.GHOST { background: #2e0d0d; border-bottom: 1px solid #5c1a1a; }

    .verdict-emoji { font-size: 36px; }

    .verdict-text h2 { font-size: 22px; font-weight: 700; }
    .verdict-text.APPLY h2 { color: #4caf87; }
    .verdict-text.CAUTION h2 { color: #ffb74d; }
    .verdict-text.GHOST h2 { color: #ef5350; }

    .verdict-text p { font-size: 14px; color: #888; margin-top: 4px; }

    .score-ring {
      margin-left: auto;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      border: 3px solid;
    }

    .score-ring.APPLY { border-color: #4caf87; color: #4caf87; }
    .score-ring.CAUTION { border-color: #ffb74d; color: #ffb74d; }
    .score-ring.GHOST { border-color: #ef5350; color: #ef5350; }

    .result-body { padding: 24px 28px; }

    .meta-row {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .meta-item { font-size: 13px; color: #666; }
    .meta-item strong { color: #ccc; display: block; font-size: 14px; }

    .flags-row { display: flex; gap: 16px; margin-bottom: 20px; }

    .flags-box {
      flex: 1;
      background: #0a0a0f;
      border-radius: 10px;
      padding: 14px;
    }

    .flags-box h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .flags-box.green h4 { color: #4caf87; }
    .flags-box.red h4 { color: #ef5350; }

    .flags-box ul { list-style: none; }
    .flags-box ul li { font-size: 13px; color: #aaa; padding: 3px 0; }
    .flags-box.green ul li::before { content: '✓ '; color: #4caf87; }
    .flags-box.red ul li::before { content: '✗ '; color: #ef5350; }

    .recommendation {
      background: #0a0a0f;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: #aaa;
      line-height: 1.6;
      border-left: 3px solid #6c63ff;
    }

    .recommendation strong { color: #6c63ff; display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

    .history-section {
      max-width: 680px;
      margin: 0 auto 60px;
    }

    .history-section h3 {
      font-size: 16px;
      color: #666;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      flex: 1;
      background: #13131f;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-box .num { font-size: 28px; font-weight: 800; }
    .stat-box .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .stat-box.apply .num { color: #4caf87; }
    .stat-box.caution .num { color: #ffb74d; }
    .stat-box.ghost .num { color: #ef5350; }
    .stat-box.total .num { color: #6c63ff; }

    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      background: #13131f;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .history-item:hover { border-color: #6c63ff; }

    .history-verdict {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .history-verdict.APPLY { background: #0d2e1a; color: #4caf87; }
    .history-verdict.CAUTION { background: #2e2000; color: #ffb74d; }
    .history-verdict.GHOST { background: #2e0d0d; color: #ef5350; }

    .history-role { font-size: 14px; color: #ccc; flex: 1; }
    .history-company { font-size: 13px; color: #666; }
    .history-date { font-size: 12px; color: #444; }

    .cached-badge {
      font-size: 11px;
      background: #1e1e2e;
      color: #6c63ff;
      padding: 2px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Job<span>Lens</span></div>
    <div class="tagline">Don't apply blind. Investigate first.</div>
  </header>

  <div class="hero">
    <h1>Is this job <span>real?</span></h1>
    <p>Paste any job posting URL. Our agent investigates before you waste time applying.</p>

    <div class="search-box">
      <input type="text" id="urlInput" placeholder="Paste job posting URL here..." />
      <button id="investigateBtn" onclick="investigate()">Investigate</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="result-card" id="resultCard">
    <div class="verdict-banner" id="verdictBanner">
      <div class="verdict-emoji" id="verdictEmoji"></div>
      <div class="verdict-text" id="verdictText">
        <h2 id="verdictLabel"></h2>
        <p id="verdictReason"></p>
      </div>
      <div class="score-ring" id="scoreRing"></div>
    </div>
    <div class="result-body">
      <div class="meta-row">
        <div class="meta-item"><strong id="metaRole">—</strong>Role</div>
        <div class="meta-item"><strong id="metaCompany">—</strong>Company</div>
        <div class="meta-item"><strong id="metaLocation">—</strong>Location</div>
        <div class="meta-item"><strong id="metaPosted">—</strong>Posted</div>
      </div>
      <div class="flags-row">
        <div class="flags-box green">
          <h4>Green Flags</h4>
          <ul id="greenFlags"></ul>
        </div>
        <div class="flags-box red">
          <h4>Red Flags</h4>
          <ul id="redFlags"></ul>
        </div>
      </div>
      <div class="recommendation">
        <strong>Agent Recommendation</strong>
        <span id="recommendation"></span>
      </div>
    </div>
  </div>

  <div class="history-section">
    <div class="stats-row" id="statsRow"></div>
    <h3>📦 Investigation History <span style="font-size:12px;color:#444">(powered by MongoDB)</span></h3>
    <div class="history-list" id="historyList"></div>
  </div>

  <script>
    const EMOJIS = { APPLY: '✅', CAUTION: '⚠️', GHOST: '👻' };
    const LABELS = { APPLY: 'Worth Applying', CAUTION: 'Proceed with Caution', GHOST: 'Likely Ghost Posting' };

    async function investigate() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;

      const btn = document.getElementById('investigateBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      document.getElementById('resultCard').style.display = 'none';

      const steps = [
        '🔍 Fetching job posting...',
        '🧠 Gemini is analyzing the role...',
        '🚩 Checking for red flags...',
        '💾 Saving to MongoDB...',
        '✅ Investigation complete'
      ];

      let i = 0;
      const interval = setInterval(() => {
        if (i < steps.length - 1) status.textContent = steps[i++];
      }, 1200);

      try {
        const res = await fetch('http://localhost:3000/api/investigate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();
        clearInterval(interval);
        status.textContent = steps[steps.length - 1];

        showResult(data);
        loadHistory();

      } catch (err) {
        clearInterval(interval);
        status.textContent = '❌ Error: ' + err.message;
      }

      btn.disabled = false;
    }

    function showResult(data) {
      const verdict = data.verdict || 'CAUTION';
      const card = document.getElementById('resultCard');

      document.getElementById('verdictBanner').className = `verdict-banner ${verdict}`;
      document.getElementById('verdictEmoji').textContent = EMOJIS[verdict];
      document.getElementById('verdictText').className = `verdict-text ${verdict}`;
      document.getElementById('verdictLabel').textContent = LABELS[verdict];
      document.getElementById('verdictReason').textContent = data.verdictReason || '';
      document.getElementById('scoreRing').textContent = data.score || '?';
      document.getElementById('scoreRing').className = `score-ring ${verdict}`;

      document.getElementById('metaRole').textContent = data.role || '—';
      document.getElementById('metaCompany').textContent = data.company || '—';
      document.getElementById('metaLocation').textContent = data.location || '—';
      document.getElementById('metaPosted').textContent = data.postedDate || '—';

      const gf = document.getElementById('greenFlags');
      const rf = document.getElementById('redFlags');
      gf.innerHTML = (data.greenFlags || []).map(f => `<li>${f}</li>`).join('');
      rf.innerHTML = (data.redFlags || []).map(f => `<li>${f}</li>`).join('');

      document.getElementById('recommendation').textContent = data.recommendation || '';

      card.style.display = 'block';
      card.scrollIntoView({ behavior: 'smooth' });
    }

    async function loadHistory() {
      try {
        const [histRes, statsRes] = await Promise.all([
          fetch('http://localhost:3000/api/history'),
          fetch('http://localhost:3000/api/stats')
        ]);
        const history = await histRes.json();
        const stats = await statsRes.json();

        document.getElementById('statsRow').innerHTML = `
          <div class="stat-box total"><div class="num">${stats.total}</div><div class="label">Investigated</div></div>
          <div class="stat-box apply"><div class="num">${stats.apply}</div><div class="label">Worth Applying</div></div>
          <div class="stat-box caution"><div class="num">${stats.caution}</div><div class="label">Caution</div></div>
          <div class="stat-box ghost"><div class="num">${stats.ghost}</div><div class="label">Ghost Jobs</div></div>
        `;

        document.getElementById('historyList').innerHTML = history.map(item => `
          <div class="history-item">
            <span class="history-verdict ${item.verdict}">${item.verdict}</span>
            <span class="history-role">${item.role || 'Unknown Role'}</span>
            <span class="history-company">${item.company || ''}</span>
            <span class="history-date">${new Date(item.investigatedAt).toLocaleDateString()}</span>
            ${item.cached ? '<span class="cached-badge">cached</span>' : ''}
          </div>
        `).join('');

      } catch (err) {
        console.error('History load failed:', err);
      }
    }

    document.getElementById('urlInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') investigate();
    });

    loadHistory();
  </script>

</body>
</html>
